name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships a stable Rust toolchain with rustfmt + clippy.
      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features

      # The package.json / package-lock.json schemas now live in the `package_json` module
      # (src/package_json/); run its strict spec-conformance suite as a named gate too.
      - name: Spec tests (package_json)
        run: "cargo test -p npm-utils package_json::"

  msrv:
    name: build on MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The crate advertises rust-version = 1.88; build the published crate on exactly that
      # toolchain so a dependency quietly raising its MSRV can't drift past us unnoticed.
      - name: Install Rust 1.88
        run: rustup toolchain install 1.88 --profile minimal

      - name: Build on MSRV
        run: cargo +1.88 build -p npm-utils --all-features
